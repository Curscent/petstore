services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/petstore
      JDBC_DATABASE_USERNAME: postgres
      JDBC_DATABASE_PASSWORD: postgres
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  db-data:
