### Frontend-only Render Blueprint for Petstore
### Deploys only the static frontend (no backend / no managed DB).
### Import this file in Render to deploy the UI on the free tier.

services:
  - type: web
    runtime: static
    name: petstore-frontend
    branch: main
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        # Replace with a public API URL for demos (your classmate's backend URL or a
        # tunnel URL such as from ngrok). For local dev, run the backend locally and
        # expose it with a tunnel and paste the URL here before importing.
        value: https://example.com/api

# Notes:
# - This blueprint deploys only the static UI and uses Render's free plan for static sites.
# - To demo the full app you still need a running API. Options:
#   * Run the backend locally and expose it with ngrok (or a similar tunnel) and
#     set `VITE_API_BASE_URL` to the tunnel URL before import.
#   * Point `VITE_API_BASE_URL` to a classmate's publicly-hosted backend.
# - Import this file via Render Dashboard → New → Import from a blueprint and choose
#   `render.frontend.yaml` in the repo root.
